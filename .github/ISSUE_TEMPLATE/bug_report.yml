name: Bug report
description: Report a single bug in the app
labels:
  - bug
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I've checked existing issues and haven't found any that already cover this bug.
          required: true
        - label: This issue contains only one bug report.
          required: true
        - label: The title is only a short summary, and the full details are written in the description below.
          required: true
        - label: The issue title and description are written in English.
          required: true
  - type: textarea
    id: bug_description
    attributes:
      label: Bug description
      description: Required. Describe the bug in as much detail as possible. Do not write things like "As in title". If you can, include steps to reproduce, expected behavior, actual behavior and logs (in case of crash).
      placeholder: |
        Required. Do not write "As in title".

        What happened?

        Steps to reproduce:
        1. ...
        2. ...
        3. ...

        Expected behavior:

        Actual behavior:
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Required. Fill in all bullets below and add any other device or ROM details that may matter.
      value: |
        - App version:
        - Android version: (say whether it is stock Android or a custom ROM)
        - Device:
        - Other relevant details:
    validations:
      required: true
  - type: textarea
    id: screenshots_videos
    attributes:
      label: Screenshots / videos
      description: Optional, but it makes easier to understand the problem if we can see it.
    validations:
      required: false
