name: Feature request
description: Suggest a single feature or improvement
labels:
  - feature request
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I've checked existing issues and haven't found any that already cover this feature request.
          required: true
        - label: This issue contains only one feature request.
          required: true
        - label: The title is only a short summary, and the full details are written in the description below.
          required: true
        - label: The issue title and description are written in English.
          required: true
  - type: textarea
    id: feature_description
    attributes:
      label: Feature description
      description: Required. Describe the feature in as much detail as possible. Do not write things like "As in title". Explain what should be added or changed, how it should work, and where in the app it should appear.
      placeholder: |
        Required. Do not write "As in title".

        What should be added or changed?

        How should it work?

        Where in the app should it appear?

        Why would this be useful?
    validations:
      required: true
